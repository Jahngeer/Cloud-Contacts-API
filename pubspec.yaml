name: cloud_contacts
description: "A professional offline-first cloud sync contact app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  image_picker: ^1.2.2
  connectivity_plus: ^7.1.1

  # 💾 SQLite Local Storage Packages Added Here:
  sqflite: ^2.4.1       # Handles Android/iOS local database engine
  path: ^1.9.0          # Handles local directory system references safely



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true

  windows:
    generate: true
    image_path: "assets/images/appicon.png"

  image_path: "assets/images/appicon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/images/
